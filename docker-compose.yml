# docker-compose.yml
#
# Airflow local para orquestar el pipeline EchoStream (Raw → Bronze → Silver → Gold).
#
# ARQUITECTURA:
# ┌─────────────────────────────────────────────────────────────────┐
# │  Docker Compose (tu Mac)                                        │
# │                                                                 │
# │  ┌──────────────┐  ┌──────────────┐  ┌──────────────┐          │
# │  │  PostgreSQL   │  │   Airflow    │  │   Airflow    │          │
# │  │  (metadata)   │←─│  Scheduler   │  │  Webserver   │          │
# │  └──────────────┘  └──────┬───────┘  └──────────────┘          │
# │                           │                 ↑                   │
# │                    ejecuta tasks      localhost:8080             │
# │                           ↓                                     │
# │                   ┌───────────────┐                             │
# │                   │  DAG Tasks    │                             │
# │                   │  raw_to_bronze│──→ GCS Bronze (Parquet)     │
# │                   └───────────────┘                             │
# └─────────────────────────────────────────────────────────────────┘
#
# ¿POR QUÉ LocalExecutor (y no CeleryExecutor)?
#   - LocalExecutor ejecuta tasks en el mismo proceso que el scheduler
#   - No necesita Redis ni workers separados → menos containers → menos RAM
#   - Perfecto para desarrollo local con pocos DAGs
#   - CeleryExecutor es para producción con muchos DAGs en paralelo
#
# CÓMO ARRANCAR:
#   docker compose up -d
#   # Espera ~30 segundos, luego abre http://localhost:8080
#   # Usuario: airflow  |  Contraseña: airflow
#
# CÓMO PARAR:
#   docker compose down

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Europe/Madrid

    # EchoStream env vars (same as BronzeLoader uses)
    GCS_RAW_BUCKET: ${GCS_RAW_BUCKET}
    GCS_BRONZE_BUCKET: ${GCS_BRONZE_BUCKET}

    # GCP credentials — generated by: gcloud auth application-default login
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-credentials.json
    GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-echostream-2026}

  volumes:
    # DAGs folder — Airflow scans this every 30s, no rebuild needed on changes
    - ./dags:/opt/airflow/dags

    # GCP credentials file mounted read-only into the container
    - ${GOOGLE_APPLICATION_CREDENTIALS_HOST:-~/.config/gcloud/application_default_credentials.json}:/opt/airflow/gcp-credentials.json:ro

    # Airflow logs accessible from outside the container
    - airflow-logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  # Stores Airflow metadata: DAG state, execution history, variables, etc.
  # Does NOT store EchoStream data.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Airflow Init ─────────────────────────────────────────────────────────
  # Runs ONCE on first `docker compose up`. Creates DB tables + admin user.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@echostream.dev
    restart: "no"

  # ── Airflow Scheduler ────────────────────────────────────────────────────
  # Scans DAGs, decides what to run, and with LocalExecutor runs tasks itself.
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Airflow Webserver ────────────────────────────────────────────────────
  # UI at http://localhost:8080 — view DAGs, trigger runs, read logs.
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-logs:
